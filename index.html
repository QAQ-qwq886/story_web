<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>午後的圖書館遇見你 - 互動故事</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1 id="game-title">午後的圖書館遇見你</h1>
            <p id="game-intro">在充滿書香的午後，一段意想不到的邂逅正要展開...</p>
        </header>

        <main id="game-card">
            <div id="story-text">
                </div>
            
            <div id="options-container">
                </div>
        </main>

        <footer id="restart-area" class="hidden">
            <button id="restart-btn" onclick="startGame()">回到故事起點</button>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
