<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>午後的圖書館相遇 - 互動故事</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <canvas id="bgCanvas"></canvas>
        
        <header id="game-header">
            <h1>午後的圖書館相遇</h1>
            <p class="subtitle">一段關於書香與心跳的小故事</p>
        </header>

        <main id="game-container">
            <section id="story-section">
                <div class="card">
                    <p id="story-text">載入中...</p>
                </div>
            </section>

            <section id="choice-section">
                </section>
        </main>

        <footer id="game-footer">
            <button id="restart-btn" class="hidden">重新開始故事</button>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
